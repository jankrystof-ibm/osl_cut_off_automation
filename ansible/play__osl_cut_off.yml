---
- name: OSL cut-off
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ vars_location | default('defaults.yml') }}"

  vars:
    # override via command line
    cloning_target_dir: "{{ playbook_dir }}/../OUT"
    # override via command line
    sync_with_upstream_enabled: false

  roles:

  #    - role: cut_off_products
#      vars:
#        product_repositories: "{{ cut_off_products.product_repositories }}"
#
#    - role: cut_off_kubesmarts_kie_tools
#      vars:
#        kogito_images_cekit_modules__quarkus_group_id: "{{ cut_off_kubesmarts_kie_tools.kogito_images_cekit_modules__quarkus_group_id }}"
#        quarkus_version: "{{ cut_off_kubesmarts_kie_tools.quarkus_version }}"
#        kie_tools_build__build_container_images: "{{ cut_off_kubesmarts_kie_tools.kie_tools_build__build_container_images }}"
#        kie_tool_repositories: "{{ cut_off_kubesmarts_kie_tools.kie_tool_repositories }}"

    - role: cut_off_kubesmarts_osl_images
      vars:
        rhel_version: "{{ cut_off_kubesmarts_osl_images.rhel_version }}"
        rhel_platform: "{{ cut_off_kubesmarts_osl_images.rhel_platform }}"
        osbs_repository_branch: "{{ cut_off_kubesmarts_osl_images.osbs_repository_branch }}"
        git_reference_to_kubesmarts_kie_tools: "{{ cut_off_kubesmarts_osl_images.git_reference_to_kubesmarts_kie_tools }}"
        osl_image_tag: "{{ cut_off_kubesmarts_osl_images.osl_image_tag }}"
        osl_images_repositories: "{{ cut_off_kubesmarts_osl_images.osl_images_repositories }}"
