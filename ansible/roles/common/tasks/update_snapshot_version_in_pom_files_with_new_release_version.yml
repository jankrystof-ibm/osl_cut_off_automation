- name: Update snapshot version in pom.xml files with new release version
  ansible.builtin.shell: |
    find . -iname "pom.xml" -print0 | xargs -0 sed -i "s/>{{ snapshot_version }}</>{{ kogito_version }}</g"
  args:
    chdir: "{{ cloning_target_dir }}/{{ item.midstream | basename }}"
  loop: "{{ repositories }}"
  loop_control:
    label: "{{ item.midstream }}"


### TODO: after pom.xml update we need to verify it
# - neither now
