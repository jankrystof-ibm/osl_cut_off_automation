- name: Commit - Update snapshot version in pom.xml files with new release version
  include_tasks: commit_changes_if_any.yml
  vars:
    repository_folder_location: "{{ cloning_target_dir }}/{{ item.midstream | basename }}"
    commit_message: "Update snapshot version in pom.xml files with new release version"
  loop: "{{ repositories }}"
  loop_control:
    label: "{{ item.midstream }}"
