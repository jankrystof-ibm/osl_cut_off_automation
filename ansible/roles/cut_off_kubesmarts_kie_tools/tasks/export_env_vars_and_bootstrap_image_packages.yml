- name: Export environment variables and bootstrap each image package that needs to be productized
  ansible.builtin.command:
    cmd: >
      pnpm bootstrap 
        -F 'osl-data-index-ephemeral-image...'
        -F 'osl-data-index-postgresql-image...'
        -F 'osl-jobs-service-ephemeral-image...' 
        -F 'osl-jobs-service-postgresql-image...' 
        -F 'osl-swf-builder-image...' 
        -F 'osl-swf-devmode-image...' 
        -F 'osl-management-console-image...' 
        -F 'osl-db-migrator-tool-image...' 
        -F 'osl-operator-bundle-image...' 
        -F  --workspace-concurrency=1
    chdir: "{{ repository_location }}"


- name: Commit - Update version in package.json
  include_tasks: "{{ playbook_dir }}/roles/common/tasks/commit_changes_if_any.yml"
  vars:
    repository_folder_location: "{{ cloning_target_dir }}/{{ item.midstream | basename }}"
    commit_message: Commit - Update version in package.json
  loop: "{{ kie_tool_repositories }}"
  loop_control:
    label: "{{ item.midstream }}"
