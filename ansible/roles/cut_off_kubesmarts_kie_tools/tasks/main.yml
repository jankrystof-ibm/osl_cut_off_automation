- name: Synchronize branches, sync optionally and create new release branches
  include_tasks: "{{ playbook_dir }}/roles/common/tasks/clone_repositories_sync_optionally_and_checkout_release_branch.yml"
  vars:
    repositories: "{{ kie_tool_repositories }}"

- name: Update all pom.xml files
  include_tasks: "{{ playbook_dir }}/roles/common/tasks/update_pom_files_with_new_version.yml"
  vars:
    repositories: "{{ kie_tool_repositories }}"

#- name: Update version in package.json files
#  include_tasks: update_package_json_files_with_new_version.yml

- name: Updates Kogito versions and repository references
  include_tasks: updates_kogito_versions.yml

- name: Update versions in index.js files
  include_tasks: update_index_js_files_with_new_version.yml
  vars:
    repository_location: "{{ cloning_target_dir }}/{{ kie_tool_repositories[0].midstream | basename }}"

- name: Update versions in environment variables
  include_tasks: update_environment_variables_with_new_version.yml
  vars:
    repository_location: "{{ cloning_target_dir }}/{{ kie_tool_repositories[0].midstream | basename }}"

## TODO: this may not not needed ...
##- name: Export environment variables and bootstrap each image package that needs to be productized
##  include_tasks: export_env_vars_and_bootstrap_image_packages.yml
##  vars:
##    repository_location: "{{ cloning_target_dir }}/{{ kie_tool_repositories[0].midstream | basename }}"

- name: Update pom.xml file
  include_tasks: "{{ playbook_dir }}/roles/common/tasks/update_pom_files_with_new_version.yml"
  vars:
    repositories: "{{ kie_tool_repositories }}"

- name: Updates github workflows and osl images
  include_tasks: update_github_workflows_and_osl_images.yml
  vars:
    repository_location: "{{ cloning_target_dir }}/{{ kie_tool_repositories[0].midstream | basename }}"

- name: Remove maven profile reproducible-build
  include_tasks: remove_maven_profile_reproducible_build.yml
  vars:
    repository_location: "{{ cloning_target_dir }}/{{ kie_tool_repositories[0].midstream | basename }}"

- name: Remove maven profile reproducible-build
  include_tasks: update_maven_build_options.yml
  vars:
    repository_location: "{{ cloning_target_dir }}/{{ kie_tool_repositories[0].midstream | basename }}"

- name: Push branches to remote
  include_tasks: "{{ playbook_dir }}/roles/common/tasks/push_repo.yml"
  vars:
    repository_folder_location:  "{{ cloning_target_dir }}/{{ item.midstream | basename }}"
  loop: "{{ kie_tool_repositories }}"
  loop_control:
    label: "{{ item.midstream }}"