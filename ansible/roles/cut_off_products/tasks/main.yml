- name: Synchronize branches, sync optionally and create new release branches
  include_tasks: "{{ playbook_dir }}/roles/common/tasks/clone_repositories_sync_optionally_and_checkout_release_branch.yml"
  vars:
    repositories: "{{ product_repositories }}"

- name: Update all pom.xml files
  include_tasks: "{{ playbook_dir }}/roles/common/tasks/update_snapshot_version_in_pom_files_with_new_release_version.yml"
  vars:
    repositories: "{{ product_repositories }}"

- name: Remove non-product modules
  include_tasks: "{{ playbook_dir }}/roles/common/tasks/remove_non_product_modules.yml"
  vars:
    repositories: "{{ product_repositories }}"

- name: Update Maven build options - ensure productized profile
  include_tasks: update_maven_build_options.yml

- name: Push branches to remote
  include_tasks: "{{ playbook_dir }}/roles/common/tasks/push_repo.yml"
  vars:
    repository_folder_location:  "{{ cloning_target_dir }}/{{ item.midstream | basename }}"
  loop: "{{ product_repositories }}"
  loop_control:
    label: "{{ item.midstream }}"